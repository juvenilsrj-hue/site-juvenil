# Site estático (HTML puro) — sem framework, sem build real.
# O "build" apenas copia os arquivos do site para uma pasta limpa (_site),
# que é o que o Netlify publica. Isso evita as configs de Remix/Vite herdadas.
[build]
  command = "rm -rf _site && mkdir _site && cp index.html robots.txt sitemap.xml _site/ && cp -R assets blog diagnostico ebook treinamentos privacidade depoimentos _site/"
  publish = "_site"

# Garante que o Netlify não tente processar funções serverless (resto do Remix).
[functions]
  directory = "_no_functions"
